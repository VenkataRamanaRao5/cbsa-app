name: Build Android Standalone APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Node.js with built-in NPM caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm' # <--- CACHE: Remembers your node_modules

      # 2. Java with built-in Gradle caching
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle' # <--- CACHE: Remembers Android SDKs and downloaded Gradle libraries

      - name: Install Node Modules
        run: npm install

      # 3. Cache the heavy C++ (NDK) compiled files 
      # This is the biggest time-saver for React Native New Architecture
      - name: Cache Android C++ Build (NDK)
        uses: actions/cache@v4
        with:
          path: android/app/.cxx
          key: ${{ runner.os }}-cxx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-cxx-

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean

      # 4. Build with the --build-cache flag to enable incremental compilation
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --build-cache -x lint -x lintVitalRelease
        env:
          GRADLE_OPTS: "-Xmx4096m -Dorg.gradle.caching=true"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
